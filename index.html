<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ИНТЕРАКТИВНАЯ КАРТА КЛЮЧЕЙ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="filters">
        <button class="filter-btn active" data-filter="all">Все <span class="count-badge" id="count-all">0</span></button>
        <button class="filter-btn" data-filter="loot">Для лута <span class="count-badge" id="count-loot">0</span></button>
        <button class="filter-btn" data-filter="quest">Квестовые <span class="count-badge" id="count-quest">0</span></button>
    </div>

                           href="media/safe.png" x="4627.8461" y="3659.1979" width="100" height="100" />

                           data-title="Ключ от кинобудки в строении D"

                           data-title="Ключ от кассы канатной дороги"

                           href="media/safe.png" x="5809.7239" y="2531.9984" width="100" height="100" />

                           href="media/safe.png" x="4272.6221" y="3414.8912" width="100" height="100" />

                    <image class="key" data-type="loot" 
                           data-title="Ключ от электрощитовой машинного отделения" 
                           data-description="Ключ от номера 203 на 2-м этаже в строении В гостиницы Нортриджа. В данный момент используется как офис. Возможно, там хранится что-то ценное" 
                           data-photo="media/Key/Northridge/ключ B203.png" 
                           href="media/safe.png" x="4363.4721" y="3440.7211" width="100" height="100" />

                           data-photo="media/Key/Northridge/ключ от зоны отдыха №2 в строении С.png" 
                           href="media/safe.png" x="4272.6221" y="3548.4941" width="100" height="100" />

                    <image class="key" data-type="loot" 
                           data-title="Ключ от частной зоны отдыха в строении С" 
                           data-description="Ключ от 4-й зоны отдыха особых гостей на 3-м этаже в строении С гостиницы Нортриджа. Возможно, там хранится много ценных личных вещей" 
                           data-photo="media/Key/Northridge/ключ от частной зоны отдыха в строении С.png" 
                           href="media/safe.png" x="4289.5451" y="3632.2186" width="100" height="100" />

                    <image class="key" data-type="loot" 
                           data-title="Ключ D208" 
                           data-description="/Ключ от номера 208 на 2-м этаже в строении D гостиницы Нортриджа. В данный момент используется как офис с электронным оборудованием" 
                           data-photo="media/Key/Northridge/Ключ D208.png" 
                           href="media/safe.png" x="4512.2167" y="3632.2186" width="100" height="100" />

                <img src="media/Map/НОРТРИДЖ 2.0.png" alt="Карта Нортриджа">

    <div class="info__bg">

            <button class="info__close">&times;</button>
            <img src="" alt="" class="info__photo">
            <h2 class="info_title"></h2>
            <p class="info__text"></p>
        </div>
    </div>
    
    <div class="tooltip"></div>

    <script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <script src="js/main.js"></script>
